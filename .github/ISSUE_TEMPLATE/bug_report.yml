name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure rule with '...'
        2. Write code '...'
        3. Run ESLint
        4. See unexpected error/no error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: ESLint Configuration
      description: Please paste your ESLint configuration
      render: javascript
      placeholder: |
        // eslint.config.js
        const kubit = require('eslint-plugin-kubit');

        module.exports = [
          kubit.configs.recommended,
          // your configuration
        ];
    validations:
      required: true

  - type: input
    id: eslint-version
    attributes:
      label: ESLint Version
      placeholder: "10.0.0"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: eslint-plugin-kubit Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "22.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
